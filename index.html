<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherStream | AI Music Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --bg-dark: #09090b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Dynamic Liquid Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            transition: background 1.5s ease;
        }

        /* Sidebar Navigation */
        nav {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 10;
        }

        .logo { font-size: 1.5rem; font-weight: 600; letter-spacing: -1px; color: var(--accent); }

        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .search-box input {
            background: transparent; border: none; color: white; margin-left: 10px; outline: none; width: 100%;
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .song-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .song-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .song-card img { width: 100%; aspect-ratio: 1; border-radius: 12px; object-fit: cover; margin-bottom: 10px; }
        .song-card h3 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Floating Player Controls */
        .player-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1000px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .current-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        .current-info img { width: 50px; height: 50px; border-radius: 8px; }

        .controls { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px; }
        .buttons { display: flex; align-items: center; gap: 20px; }
        .play-btn { background: white; color: black; border-radius: 50%; padding: 10px; cursor: pointer; }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.7rem; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        .volume-container { display: flex; align-items: center; gap: 10px; width: 20%; justify-content: flex-end; }
        input[type="range"] { accent-color: var(--accent); cursor: pointer; }

        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-auth {
            padding: 12px 30px; border-radius: 30px; border: none; background: var(--accent);
            font-weight: 600; cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 768px) {
            nav { display: none; }
            .current-info { width: 60%; }
            .volume-container { display: none; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 class="logo">AetherStream</h1>
        <p>Connect your Google Drive to start streaming</p>
        <button class="btn-auth" onclick="handleAuthClick()">Authorize Access</button>
    </div>

    <div id="bg-canvas"></div>

    <nav>
        <div class="logo">AETHER</div>
        <div class="search-box">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search library..." oninput="filterSongs()">
        </div>
        <div class="menu">
            <p style="color: var(--text-dim); margin-bottom: 10px; font-size: 0.8rem;">YOUR LIBRARY</p>
            <div id="recent-list"></div>
        </div>
    </nav>

    <main>
        <h2 id="folder-name">Loading Library...</h2>
        <div class="playlist-grid" id="playlistGrid">
            </div>
    </main>

    <div class="player-bar">
        <div class="current-info">
            <img src="https://via.placeholder.com/50" id="current-art">
            <div>
                <h4 id="current-title">No song selected</h4>
                <p id="current-artist" style="font-size: 0.8rem; color: var(--text-dim);">Select from Drive</p>
            </div>
        </div>

        <div class="controls">
            <div class="buttons">
                <span class="material-symbols-rounded" onclick="toggleShuffle()" id="shuffle-icon">shuffle</span>
                <span class="material-symbols-rounded" onclick="prevSong()">skip_previous</span>
                <span class="material-symbols-rounded play-btn" id="play-trigger" onclick="togglePlay()">play_arrow</span>
                <span class="material-symbols-rounded" onclick="nextSong()">skip_next</span>
                <span class="material-symbols-rounded" onclick="toggleRepeat()" id="repeat-icon">repeat</span>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar" id="seek-slider" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-container">
            <span class="material-symbols-rounded">volume_up</span>
            <input type="range" min="0" max="1" step="0.1" oninput="changeVolume(this.value)">
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>

    <script>
        /* --- CONFIGURATION --- */
        const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com'; // Change this
        const FOLDER_ID = 'https://drive.google.com/drive/folders/1d4HCWf80E-JeIwHOExjEZA3SivpLXd2K'; // Change this
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

        let accessToken = null;
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        
        let playlist = [];
        let currentIndex = 0;
        let isShuffle = false;
        let isRepeat = false;

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-trigger');

        /* --- AUTHENTICATION FLOW --- */
        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
            gapiInited = true; checkAuthReady();
        }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    if (resp.error) return;
                    accessToken = resp.access_token;
                    document.getElementById('auth-overlay').style.display = 'none';
                    fetchDriveFiles();
                },
            });
            gisInited = true; checkAuthReady();
        }
        function checkAuthReady() { if(gapiInited && gisInited) console.log("System Ready"); }
        function handleAuthClick() { tokenClient.requestAccessToken(); }

        /* --- DATA FETCHING --- */
        async function fetchDriveFiles() {
            try {
                const response = await gapi.client.drive.files.list({
                    q: `'${FOLDER_ID}' in parents and mimeType contains 'audio/'`,
                    fields: 'files(id, name, thumbnailLink, size)',
                });
                playlist = response.result.files;
                renderPlaylist(playlist);
                if(playlist.length > 0) loadFromStorage();
            } catch (err) { console.error("Drive Error:", err); }
        }

        /* --- UI RENDERING --- */
        function renderPlaylist(list) {
            const grid = document.getElementById('playlistGrid');
            grid.innerHTML = list.map((song, index) => `
                <div class="song-card" onclick="playSong(${index})">
                    <img src="${song.thumbnailLink || 'https://via.placeholder.com/150/222/fff?text=Music'}" alt="cover">
                    <h3>${song.name.replace('.mp3', '')}</h3>
                </div>
            `).join('');
        }

        /* --- PLAYER LOGIC --- */
        function playSong(index) {
            currentIndex = index;
            const song = playlist[currentIndex];
            
            // STREAMING KEY: Set src to Drive API media endpoint with Bearer Token
            const streamUrl = `https://www.googleapis.com/drive/v3/files/${song.id}?alt=media`;
            
            // Native fetch is used internally by audio element, but we need to inject the auth header
            // Since we can't easily add headers to <audio> src, we use the token in URL or ObjectURL
            // The most reliable way for authenticated streaming without public links:
            fetch(streamUrl, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            })
            .then(response => response.blob())
            .then(blob => {
                const blobUrl = URL.createObjectURL(blob);
                audio.src = blobUrl;
                audio.play();
                updateUI(song);
                saveToStorage(index);
            });
        }

        function updateUI(song) {
            document.getElementById('current-title').innerText = song.name;
            document.getElementById('current-art').src = song.thumbnailLink || 'https://via.placeholder.com/50';
            document.getElementById('bg-canvas').style.background = `linear-gradient(45deg, #09090b, ${generateRandomColor()})`;
            playBtn.innerText = 'pause';
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.innerText = 'pause'; }
            else { audio.pause(); playBtn.innerText = 'play_arrow'; }
        }

        function nextSong() {
            let next = isShuffle ? Math.floor(Math.random() * playlist.length) : currentIndex + 1;
            if (next >= playlist.length) next = 0;
            playSong(next);
        }

        function prevSong() {
            let prev = currentIndex - 1;
            if (prev < 0) prev = playlist.length - 1;
            playSong(prev);
        }

        /* --- UTILS & EXTRAS --- */
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            if(!isNaN(audio.duration)) document.getElementById('time-total').innerText = formatTime(audio.duration);
        };

        audio.onended = () => { if(isRepeat) audio.play(); else nextSong(); };

        function seek(e) {
            const rect = document.getElementById('seek-slider').getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        }

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function generateRandomColor() {
            return '#' + Math.floor(Math.random()*16777215).toString(16) + '55';
        }

        function changeVolume(val) { audio.volume = val; }

        function saveToStorage(index) { localStorage.setItem('aether_last', index); }
        function loadFromStorage() {
            const last = localStorage.getItem('aether_last');
            if(last) { currentIndex = parseInt(last); updateUI(playlist[currentIndex]); }
        }

        // Keyboard Shortcuts
        window.onkeydown = (e) => {
            if(e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if(e.code === 'ArrowRight') nextSong();
            if(e.code === 'ArrowLeft') prevSong();
        };

        function filterSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = playlist.filter(s => s.name.toLowerCase().includes(query));
            renderPlaylist(filtered);
        }
    </script>
</body>
</html>
