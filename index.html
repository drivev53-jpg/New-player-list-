<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX PLAYER | 90s Hits</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --fox-orange: #ff4d00;
            --fox-glow: rgba(255, 77, 0, 0.6);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Remove mobile tap highlight */
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Column for player bar at bottom */
        }

        /* Dynamic Background with visualizer placeholders */
        #liquid-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
            transition: 2s ease;
        }

        /* Authorization Screen Overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #auth-overlay .logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            color: var(--fox-orange);
            text-shadow: 0 0 30px var(--fox-glow);
            margin-bottom: 20px;
        }

        #auth-overlay p {
            color: var(--text-dim);
            max-width: 350px;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .btn-auth {
            padding: 18px 50px;
            border-radius: 50px;
            border: none;
            background: var(--fox-orange);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 40px var(--fox-glow);
            transition: 0.3s;
        }

        .btn-auth:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px var(--fox-glow);
        }

        /* Main App Layout */
        #app {
            display: none; /* Hidden until auth */
            flex: 1;
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 280px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(50px);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            z-index: 10;
        }

        nav .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--fox-orange);
            text-shadow: 0 0 25px var(--fox-glow);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item.active {
            font-weight: 600;
            color: var(--fox-orange);
        }

        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 12px;
            outline: none;
            width: 100%;
            font-size: 1rem;
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            padding-bottom: 160px; /* Space for player bar */
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .song-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .song-card:hover {
            transform: scale(1.05);
            border-color: var(--fox-orange);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .song-card img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .song-card h3 {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        /* Hover Play Icon */
        .song-card .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--fox-orange);
            color: white;
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 5px 20px var(--fox-glow);
            opacity: 0;
            transition: 0.3s;
        }

        .song-card:hover .play-icon {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Player Bar at Bottom */
        .player-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .current-info {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 30%;
        }

        .current-info img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            object-fit: cover;
        }

        .current-info-text {
            overflow: hidden;
        }

        .current-info-text h4 {
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .current-info-text p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            gap: 12px;
        }

        .buttons {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .buttons .material-symbols-rounded {
            color: var(--text-dim);
            cursor: pointer;
            font-size: 24px;
            transition: 0.2s;
        }

        .buttons .material-symbols-rounded:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .buttons .play-btn {
            background: white;
            color: black;
            border-radius: 50%;
            padding: 14px;
            font-size: 28px;
            font-variation-settings: 'FILL' 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .buttons .play-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--fox-orange);
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--fox-glow);
            transition: width 0.1s linear;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 25%;
            justify-content: flex-end;
        }

        .volume-container .material-symbols-rounded {
            color: var(--text-dim);
            font-size: 22px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            accent-color: var(--fox-orange);
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--fox-glow);
        }

        /* Scrollbar customization */
        main::-webkit-scrollbar {
            width: 8px;
        }

        main::-webkit-scrollbar-track {
            background: transparent;
        }

        main::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        main::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            nav {
                width: 80px;
                padding: 2.5rem 1rem;
                align-items: center;
            }
            nav .logo, .nav-item span {
                display: none;
            }
            main {
                padding: 2rem;
            }
            .section-title {
                font-size: 1.8rem;
            }
            .playlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 600px) {
            nav {
                display: none;
            }
            .player-bar {
                width: 96%;
                padding: 15px;
                bottom: 15px;
                border-radius: 25px;
            }
            .current-info {
                width: 60%;
            }
            .current-info img {
                width: 50px;
                height: 50px;
            }
            .controls {
                width: 40%;
                gap: 5px;
            }
            .buttons {
                gap: 15px;
            }
            .buttons .play-btn {
                padding: 10px;
                font-size: 22px;
            }
            .progress-container, .volume-container, .search-box {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 class="logo">FOX PLAYER</h1>
        <p>Stream your 90s Evergreen Bollywood Collection from Google Drive.</p>
        <button class="btn-auth" onclick="handleAuthClick()">CONNECT GOOGLE DRIVE</button>
    </div>

    <div id="liquid-bg"></div>

    <div id="app">
        
        <nav>
            <div class="logo">FOX</div>
            <div class="search-box">
                <span class="material-symbols-rounded">search</span>
                <input type="text" id="searchInput" placeholder="Search a track..." oninput="filterSongs()">
            </div>
            <div class="nav-item active">
                <span class="material-symbols-rounded">library_music</span>
                <span>My Library</span>
            </div>
            <div class="nav-item">
                <span class="material-symbols-rounded">history</span>
                <span>Recently Played</span>
            </div>
            <div style="margin-top: auto; font-size: 0.75rem; color: #444; text-align: center;">
                v1.0.0
            </div>
        </nav>

        <main>
            <div class="section-header">
                <h2 class="section-title">90s Evergreen Hits</h2>
                <span style="font-size: 0.9rem; color: var(--text-dim);" id="track-count">0 tracks</span>
            </div>
            
            <div class="playlist-grid" id="playlistGrid">
                </div>
        </main>

        <div class="player-bar">
            <div class="current-info">
                <img src="https://via.placeholder.com/150/000/ff4d00?text=FOX" id="current-art">
                <div class="current-info-text">
                    <h4 id="current-title">Fox Player</h4>
                    <p id="current-artist">Ready to stream</p>
                </div>
            </div>

            <div class="controls">
                <div class="buttons">
                    <span class="material-symbols-rounded" onclick="prevSong()">skip_previous</span>
                    <span class="material-symbols-rounded play-btn" id="play-trigger" onclick="togglePlay()">play_arrow</span>
                    <span class="material-symbols-rounded" onclick="nextSong()">skip_next</span>
                </div>
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <div class="progress-bar" id="seek-slider" onclick="seek(event)">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="volume-container">
                <span class="material-symbols-rounded">volume_up</span>
                <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
            </div>
        </div>

    </div><audio id="audio-player"></audio>

    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>

    <script>
        /* --- CONFIGURATION --- */
        // AHMED: Maine aapka Client ID aur Folder ID yahan set kar diya hai.
        const CLIENT_ID = '1053451371076-2cpluqqln0o9t4n5ibrl6a4sasdm89lt.apps.googleusercontent.com'; //
        const FOLDER_ID = '1094dBOkA5sMuW7Q-ATnV6GvqPaL6Uq5L'; //
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly'; //

        let accessToken = null;
        let tokenClient;
        let playlist = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-trigger');

        /* --- 1. AUTHENTICATION (GOOGLE) --- */
        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] }); //
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    if (resp.error) {
                        alert("Authorization Failed: " + resp.error);
                        return;
                    }
                    accessToken = resp.access_token;
                    document.getElementById('auth-overlay').style.display = 'none'; //
                    document.getElementById('app').style.display = 'flex'; //
                    fetchDriveFiles(); //
                },
            });
        }

        function handleAuthClick() {
            // Brave User Tip: If pop-up is blocked, turn Shields OFF for this site.
            tokenClient.requestAccessToken(); //
        }

        /* --- 2. DATA FETCHING --- */
        async function fetchDriveFiles() {
            try {
                // Fetch only audio files inside the specified folder
                const response = await gapi.client.drive.files.list({
                    q: `'${FOLDER_ID}' in parents and mimeType contains 'audio/'`, //
                    fields: 'files(id, name, thumbnailLink)', //
                    pageSize: 100 //
                });
                playlist = response.result.files; //
                document.getElementById('track-count').innerText = `${playlist.length} tracks`; //
                renderPlaylist(playlist); //
            } catch (err) {
                console.error("Drive API Error:", err);
                alert("Error fetching files. Ensure you are added as a 'Test User' and the Folder ID is correct."); //
            }
        }

        /* --- 3. UI RENDERING --- */
        function renderPlaylist(list) {
            const grid = document.getElementById('playlistGrid');
            grid.innerHTML = ''; //
            
            if (list.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-dim); margin-top: 50px;">No MP3 tracks found in the folder.</p>'; //
                return;
            }

            grid.innerHTML = list.map((song, index) => `
                <div class="song-card" onclick="playSong(${index})">
                    <img src="${song.thumbnailLink ? song.thumbnailLink.replace('=s220', '=s600') : 'https://via.placeholder.com/300/000/ff4d00?text=FOX+Music'}" alt="cover">
                    <span class="material-symbols-rounded play-icon">play_arrow</span>
                    <h3>${song.name.replace('.mp3', '')}</h3>
                </div>`).join(''); //
        }

 /* --- 4. PLAYER LOGIC --- */
        async function playSong(index) {
            currentIndex = index; //
            const song = playlist[currentIndex]; //
            const streamUrl = `https://www.googleapis.com/drive/v3/files/${song.id}?alt=media`; //
            
            // 1. UI Updates
            document.getElementById('current-title').innerText = song.name.replace('.mp3', ''); //
            document.getElementById('current-artist').innerText = "90's Evergreen Hits"; //
            document.getElementById('current-art').src = song.thumbnailLink || 'https://via.placeholder.com/150/000/ff4d00?text=FOX'; //
            document.getElementById('liquid-bg').style.background = `radial-gradient(circle at 50% 50%, #2a1000 0%, #000000 100%)`; //

            // 2. Fetch authenticated stream and play
            try {
                const response = await fetch(streamUrl, {
                    headers: { 'Authorization': `Bearer ${accessToken}` } //
                });
                const blob = await response.blob(); //
                audio.src = URL.createObjectURL(blob); //
                audio.play(); //
                playBtn.innerText = 'pause'; //
            } catch (err) {
                console.error("Playback Error:", err);
                alert("Error playing track. Please try again."); //
            }
        }

        function togglePlay() {
            if (audio.src) {
                if (audio.paused) {
                    audio.play(); //
                    playBtn.innerText = 'pause'; //
                } else {
                    audio.pause(); //
                    playBtn.innerText = 'play_arrow'; //
                }
            }
        }

        function nextSong() {
            playSong((currentIndex + 1) % playlist.length); //
        }

        function prevSong() {
            playSong((currentIndex - 1 + playlist.length) % playlist.length); //
        }

        /* --- 5. UTILITIES --- */
        // Time Update
        audio.ontimeupdate = () => {
            const current = audio.currentTime; //
            const duration = audio.duration; //
            const pct = (current / duration) * 100; //
            
            document.getElementById('progress-fill').style.width = pct + '%'; //
            document.getElementById('time-current').innerText = formatTime(current); //
            if(!isNaN(duration)) document.getElementById('time-total').innerText = formatTime(duration); //
        };

        // Auto-play next song
        audio.onended = () => { nextSong(); }; //

        function formatTime(secs) {
            const min = Math.floor(secs / 60); //
            const sec = Math.floor(secs % 60); //
            return `${min}:${sec < 10 ? '0' : ''}${sec}`; //
        }

        function seek(e) {
            if (audio.duration) {
                const rect = document.getElementById('seek-slider').getBoundingClientRect(); //
                const pos = (e.clientX - rect.left) / rect.width; //
                audio.currentTime = pos * audio.duration; //
            }
        }

        function changeVolume(val) {
            audio.volume = val; //
        }

        function filterSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase(); //
            const filtered = playlist.filter(s => s.name.toLowerCase().includes(query)); //
            renderPlaylist(filtered); //
        }
    </script>
</body>
</html>
