<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX PLAYER • 90s Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        /* === styles exactly as provided, no visual changes === */
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --fox-orange: #ff4d00;
            --fox-glow: rgba(255, 77, 0, 0.6);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #liquid-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
            transition: 2s ease;
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #auth-overlay .logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            color: var(--fox-orange);
            text-shadow: 0 0 30px var(--fox-glow);
            margin-bottom: 20px;
        }

        #auth-overlay p {
            color: var(--text-dim);
            max-width: 350px;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .btn-auth {
            padding: 18px 50px;
            border-radius: 50px;
            border: none;
            background: var(--fox-orange);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 40px var(--fox-glow);
            transition: 0.3s;
        }

        .btn-auth:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px var(--fox-glow);
        }

        #app {
            display: none;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        nav {
            width: 280px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(50px);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            z-index: 10;
        }

        nav .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--fox-orange);
            text-shadow: 0 0 25px var(--fox-glow);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item.active {
            font-weight: 600;
            color: var(--fox-orange);
        }

        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 12px;
            outline: none;
            width: 100%;
            font-size: 1rem;
        }

        main {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
            padding-bottom: 160px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .song-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .song-card:hover {
            transform: scale(1.05);
            border-color: var(--fox-orange);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .song-card img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .song-card h3 {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .song-card .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--fox-orange);
            color: white;
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 5px 20px var(--fox-glow);
            opacity: 0;
            transition: 0.3s;
        }

        .song-card:hover .play-icon {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .player-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .current-info {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 30%;
        }

        .current-info img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            object-fit: cover;
        }

        .current-info-text {
            overflow: hidden;
        }

        .current-info-text h4 {
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .current-info-text p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            gap: 12px;
        }

        .buttons {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .buttons .material-symbols-rounded {
            color: var(--text-dim);
            cursor: pointer;
            font-size: 24px;
            transition: 0.2s;
        }

        .buttons .material-symbols-rounded:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .buttons .play-btn {
            background: white;
            color: black;
            border-radius: 50%;
            padding: 14px;
            font-size: 28px;
            font-variation-settings: 'FILL' 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .buttons .play-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--fox-orange);
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--fox-glow);
            transition: width 0.1s linear;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 25%;
            justify-content: flex-end;
        }

        .volume-container .material-symbols-rounded {
            color: var(--text-dim);
            font-size: 22px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            accent-color: var(--fox-orange);
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--fox-glow);
        }

        main::-webkit-scrollbar {
            width: 8px;
        }

        main::-webkit-scrollbar-track {
            background: transparent;
        }

        main::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        main::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 900px) {
            nav {
                width: 80px;
                padding: 2.5rem 1rem;
                align-items: center;
            }
            nav .logo, .nav-item span {
                display: none;
            }
            main {
                padding: 2rem;
            }
            .section-title {
                font-size: 1.8rem;
            }
            .playlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 20px;
            }
        }

        @media (max-width: 600px) {
            nav {
                display: none;
            }
            .player-bar {
                width: 96%;
                padding: 15px;
                bottom: 15px;
                border-radius: 25px;
            }
            .current-info {
                width: 60%;
            }
            .current-info img {
                width: 50px;
                height: 50px;
            }
            .controls {
                width: 40%;
                gap: 5px;
            }
            .buttons {
                gap: 15px;
            }
            .buttons .play-btn {
                padding: 10px;
                font-size: 22px;
            }
            .progress-container, .volume-container, .search-box {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 class="logo">FOX PLAYER</h1>
        <p>Stream your 90s Evergreen Bollywood Collection from Google Drive.</p>
        <button class="btn-auth" onclick="handleAuthClick()">CONNECT GOOGLE DRIVE</button>
    </div>

    <div id="liquid-bg"></div>

    <div id="app">
        
        <nav>
            <div class="logo">FOX</div>
            <div class="search-box">
                <span class="material-symbols-rounded">search</span>
                <input type="text" id="searchInput" placeholder="Search a track..." oninput="filterSongs()">
            </div>
            <div class="nav-item active">
                <span class="material-symbols-rounded">library_music</span>
                <span>My Library</span>
            </div>
            <div class="nav-item">
                <span class="material-symbols-rounded">history</span>
                <span>Recently Played</span>
            </div>
            <div style="margin-top: auto; font-size: 0.75rem; color: #444; text-align: center;">
                v1.0.0
            </div>
        </nav>

        <main>
            <div class="section-header">
                <h2 class="section-title">90s Evergreen Hits</h2>
                <span style="font-size: 0.9rem; color: var(--text-dim);" id="track-count">0 tracks</span>
            </div>
            
            <div class="playlist-grid" id="playlistGrid">
                <!-- dynamic cards -->
            </div>
        </main>

        <div class="player-bar">
            <div class="current-info">
                <img src="https://via.placeholder.com/150/000/ff4d00?text=FOX" id="current-art" alt="cover">
                <div class="current-info-text">
                    <h4 id="current-title">Fox Player</h4>
                    <p id="current-artist">Ready to stream</p>
                </div>
            </div>

            <div class="controls">
                <div class="buttons">
                    <span class="material-symbols-rounded" onclick="prevSong()">skip_previous</span>
                    <span class="material-symbols-rounded play-btn" id="play-trigger" onclick="togglePlay()">play_arrow</span>
                    <span class="material-symbols-rounded" onclick="nextSong()">skip_next</span>
                </div>
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <div class="progress-bar" id="seek-slider" onclick="seek(event)">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="volume-container">
                <span class="material-symbols-rounded">volume_up</span>
                <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="changeVolume(this.value)">
            </div>
        </div>

    </div>

    <audio id="audio-player"></audio>

    <!-- Google Identity Services and API scripts -->
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>

    <script>
        /* --- CONFIGURATION (your credentials) --- */
        const CLIENT_ID = '1053451371076-2cpluqqln0o9t4n5ibrl6a4sasdm89lt.apps.googleusercontent.com';
        const FOLDER_ID = '1094dBOkA5sMuW7Q-ATnV6GvqPaL6Uq5L';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

        let accessToken = null;
        let tokenClient;
        let playlist = [];               // full unfiltered list
        let currentIndex = 0;
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-trigger');

        /* --- 1. LOAD GOOGLE API & CLIENT --- */
        function gapiLoaded() {
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({
                        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
                    });
                    console.log('gapi client ready');
                } catch (err) {
                    console.error('gapi.init error', err);
                }
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (resp) => {
                    if (resp.error) {
                        alert('Authorization failed: ' + resp.error);
                        return;
                    }
                    accessToken = resp.access_token;
                    // Set token for gapi client
                    gapi.client.setToken({ access_token: accessToken });
                    
                    // Hide overlay and show app
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    
                    // Fetch files from your folder
                    fetchDriveFiles();
                },
            });
        }

        function handleAuthClick() {
            // If popup is blocked, suggest disabling shields
            tokenClient.requestAccessToken();
        }

        /* --- 2. FETCH AUDIO FILES FROM YOUR FOLDER --- */
        async function fetchDriveFiles() {
            try {
                const response = await gapi.client.drive.files.list({
                    q: `'${FOLDER_ID}' in parents and mimeType contains 'audio/'`,
                    fields: 'files(id, name, thumbnailLink)',
                    pageSize: 100
                });
                playlist = response.result.files || [];
                document.getElementById('track-count').innerText = `${playlist.length} tracks`;
                renderPlaylist(playlist);
            } catch (err) {
                console.error('Drive API error:', err);
                alert('Error fetching files. Check Folder ID and ensure you are a test user.');
            }
        }

        /* --- 3. RENDER GRID (using song ID for reliable playback) --- */
        function renderPlaylist(songsArray) {
            const grid = document.getElementById('playlistGrid');
            if (!songsArray.length) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-dim); margin-top:50px;">📁 No audio files found in this folder.</p>';
                return;
            }

            grid.innerHTML = songsArray.map(song => {
                const thumb = song.thumbnailLink 
                    ? song.thumbnailLink.replace('=s220', '=s600') 
                    : 'https://via.placeholder.com/300/000/ff4d00?text=FOX+Music';
                const displayName = song.name.replace(/\.(mp3|m4a|wav)$/i, '');
                // use playSongById with file ID
                return `<div class="song-card" onclick="playSongById('${song.id}')">
                    <img src="${thumb}" alt="cover" loading="lazy">
                    <span class="material-symbols-rounded play-icon">play_arrow</span>
                    <h3>${displayName}</h3>
                </div>`;
            }).join('');
        }

                /* --- 4. PLAYBACK LOGIC (by ID, then index) --- */
        function playSongById(fileId) {
            const index = playlist.findIndex(s => s.id === fileId);
            if (index === -1) return;
            playSong(index);
        }

        async function playSong(index) {
            currentIndex = index;
            const song = playlist[currentIndex];
            
            // Update UI
            document.getElementById('current-title').innerText = song.name.replace(/\.(mp3|m4a|wav)$/i, '');
            document.getElementById('current-artist').innerText = "90's Evergreen Hits";
            const artUrl = song.thumbnailLink 
                ? song.thumbnailLink.replace('=s220', '=s600') 
                : 'https://via.placeholder.com/150/000/ff4d00?text=FOX';
            document.getElementById('current-art').src = artUrl;
            document.getElementById('liquid-bg').style.background = `radial-gradient(circle at 50% 50%, #2a1000 0%, #000000 100%)`;

            // Stream file with Bearer token
            const streamUrl = `https://www.googleapis.com/drive/v3/files/${song.id}?alt=media`;
            try {
                const response = await fetch(streamUrl, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (!response.ok) throw new Error('fetch failed');
                const blob = await response.blob();
                audio.src = URL.createObjectURL(blob);
                audio.play();
                playBtn.innerText = 'pause';
            } catch (err) {
                console.error('Playback error:', err);
                alert('Could not play this track. Try again.');
            }
        }

        function togglePlay() {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play();
                playBtn.innerText = 'pause';
            } else {
                audio.pause();
                playBtn.innerText = 'play_arrow';
            }
        }

        function nextSong() {
            if (playlist.length) playSong((currentIndex + 1) % playlist.length);
        }

        function prevSong() {
            if (playlist.length) playSong((currentIndex - 1 + playlist.length) % playlist.length);
        }

        /* --- 5. AUDIO EVENT HANDLERS --- */
        audio.ontimeupdate = () => {
            const current = audio.currentTime;
            const duration = audio.duration;
            if (duration && !isNaN(duration)) {
                const pct = (current / duration) * 100;
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('time-current').innerText = formatTime(current);
                document.getElementById('time-total').innerText = formatTime(duration);
            }
        };

        audio.onended = () => {
            nextSong();
        };

        audio.onpause = () => {
            playBtn.innerText = 'play_arrow';
        };

        audio.onplay = () => {
            playBtn.innerText = 'pause';
        };

        function formatTime(secs) {
            if (isNaN(secs)) return '0:00';
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function seek(e) {
            if (!audio.duration || isNaN(audio.duration)) return;
            const rect = document.getElementById('seek-slider').getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        }

        function changeVolume(val) {
            audio.volume = parseFloat(val);
        }

        /* --- 6. SEARCH FILTER (visual only) --- */
        function filterSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = playlist.filter(s => s.name.toLowerCase().includes(query));
            renderPlaylist(filtered);
        }

        // Expose functions globally for onclick attributes
        window.handleAuthClick = handleAuthClick;
        window.playSongById = playSongById;
        window.togglePlay = togglePlay;
        window.nextSong = nextSong;
        window.prevSong = prevSong;
        window.seek = seek;
        window.changeVolume = changeVolume;
        window.filterSongs = filterSongs;
    </script>
</body>
</html>
